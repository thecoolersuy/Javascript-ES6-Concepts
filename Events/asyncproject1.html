<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 class="heading">Click it</h1>
    <input type="button" id = "stop" value = "Button">
</body>
<script>

    const changeHeader = function(){
        document.querySelector(".heading").innerHTML = "changed after 4 seconds"
    }
    
    const change = setTimeout(changeHeader,2000)

    document.querySelector("#stop").addEventListener("click", function(){
        clearTimeout(change)
        console.log("Stopped")
    })

    

    setInterval( () =>{
        console.log("printed")
    },4000)
    setTimeout( () =>{
        console.log("printed")
    },4000)
</script>
</html>
