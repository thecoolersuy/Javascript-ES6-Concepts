<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #424242;
            color:white;
        }
        .header{
            text-align: center;
            font-size: 40px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
    </style>
</head>
<body>
    <p class="header">Press any key to detect it</p>
    <p id="detect"></p>
</body>
<script>
   window.addEventListener("keydown", (e)=>{
      document.querySelector("#detect").innerHTML = `${e.key}`
   }) 
</script>
</html>
