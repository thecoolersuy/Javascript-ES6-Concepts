<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        background-color: #424242
    }
</style>
<body>
    <div class="container">
        <h1 id="header">Start should continuously display different colours in 2 seconds <br> and stop should stop the colour at what its at right at that time</h1>
        <input type="button" id="start" value="start">
        <input type="button" id ="stop" value ="stop">
    </div>
</body>
<script>
    let changing;
    let colors =["red", "orange", "blue", "black","white","purple"]

   
    
    

    const colorChange =() =>{
        let randomIndex = Math.floor(Math.random()*colors.length)
        document.body.style.backgroundColor = colors[randomIndex]
        
    }
    document.querySelector("#start").addEventListener("click", function(){
         console.log("color is changing")
        changing = setInterval( colorChange,1000)
    })


    document.querySelector("#stop").addEventListener("click", function(){
        clearInterval(changing)
        console.log("stopped")
    })
</script>
</html>
